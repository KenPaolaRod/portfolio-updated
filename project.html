  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:           #08080A;
      --bg-2:         #0E0E11;
      --surface:      rgba(255,255,255,0.04);
      --border:       rgba(255,255,255,0.08);
      --border-gold:  rgba(201,144,106,0.35);
      --border-lav:   rgba(184,169,217,0.25);
      --rose:         #C9906A;
      --rose-light:   #E8B49A;
      --lavender:     #B8A9D9;
      --lavender-light:#D4CCEF;
      --ivory:        #FAF7F4;
      --text-1:       #F5F0EB;
      --text-2:       rgba(245,240,235,0.55);
      --text-3:       rgba(245,240,235,0.28);
      --f-display:    'Cormorant', serif;
      --f-ui:         'Josefin Sans', sans-serif;
      --f-body:       'DM Sans', sans-serif;
      --ease:         cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
      --radius-md:    16px;
      --radius-lg:    24px;
      --radius-xl:    40px;
      /* overridden per project by JS */
      --accent:       #C9906A;
      --accent-rgb:   201,144,106;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; scroll-padding-top:80px; }
    body {
      background: var(--bg); color: var(--text-1);
      font-family: var(--f-body); font-weight: 300;
      line-height: 1.65; overflow-x: hidden; cursor: none;
    }
    ::selection { background: rgba(var(--accent-rgb),0.25); color: var(--ivory); }

    /* ─── CURSOR ─── */
    @media (max-width:768px) { body { cursor:auto; } #cursorTrail { display:none; } }

    /* ─── AURORA ─── */
    .aurora { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .blob { position:absolute; border-radius:50%; filter:blur(130px); opacity:0.28; will-change:transform; }
    .blob-1 { width:700px; height:700px; top:-15%; left:-12%; animation:float1 28s ease-in-out infinite; }
    .blob-2 { width:600px; height:600px; top:10%; right:-10%; opacity:0.2; animation:float2 34s ease-in-out infinite; }
    .blob-3 { width:500px; height:500px; bottom:20%; left:30%; opacity:0.18; animation:float3 22s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(60px,-80px) scale(1.08)} 66%{transform:translate(-40px,55px) scale(0.94)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(-70px,45px) scale(1.1)} 70%{transform:translate(45px,-60px) scale(0.97)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(55px,70px) scale(1.05)} }

    /* ─── PARTICLES ─── */
    #pcv { position:fixed; inset:0; z-index:1; pointer-events:none; }

    /* ─── NAV ─── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:900;
      padding:0 5%; height:72px;
      display:flex; align-items:center; justify-content:space-between;
      transition:background 0.4s, backdrop-filter 0.4s;
    }
    nav.scrolled {
      background:rgba(8,8,10,0.78); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      border-bottom:1px solid var(--border);
    }
    .nav-back {
      font-family:var(--f-ui); font-size:0.63rem; font-weight:300;
      letter-spacing:0.22em; text-transform:uppercase;
      color:var(--text-2); text-decoration:none;
      display:flex; align-items:center; gap:0.6rem;
      transition:color 0.25s;
    }
    .nav-back:hover { color:var(--text-1); }
    .nav-back::before { content:'←'; transition:transform 0.25s; }
    .nav-back:hover::before { transform:translateX(-4px); }
    .nav-tag { font-family:var(--f-ui); font-size:0.58rem; font-weight:300; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-3); }
    .nav-live {
      font-family:var(--f-ui); font-size:0.63rem; font-weight:300;
      letter-spacing:0.22em; text-transform:uppercase;
      color:var(--text-1); text-decoration:none;
      padding:10px 24px; border:1px solid var(--border-gold); border-radius:40px;
      transition:all 0.25s; background:transparent;
    }
    .nav-live:hover { background:rgba(var(--accent-rgb),0.1); border-color:var(--accent); box-shadow:0 0 24px rgba(var(--accent-rgb),0.2); }

    /* ─── SHARED ─── */
    @keyframes fu { to { opacity:1; transform:translateY(0); } }
    @keyframes su { to { opacity:1; transform:translateY(0); } }
    .reveal { opacity:0; transform:translateY(44px); transition:opacity 0.85s var(--ease-out), transform 0.85s var(--ease-out); }
    .reveal.in { opacity:1; transform:translateY(0); }

    /* ─── PROJECT HERO ─── */
    #proj-hero {
      position:relative; z-index:2;
      min-height:100vh; display:flex; flex-direction:column; justify-content:flex-end;
      padding:140px 5% 90px; overflow:hidden;
    }
    .ph-meta {
      display:flex; align-items:center; gap:1.8rem; margin-bottom:2.8rem;
      opacity:0; transform:translateY(16px);
      animation:fu 0.7s 0.3s var(--ease-out) forwards;
    }
    .ph-tag {
      font-family:var(--f-ui); font-size:0.58rem; font-weight:300;
      letter-spacing:0.35em; text-transform:uppercase; color:var(--accent);
      padding:8px 18px; border:1px solid rgba(var(--accent-rgb),0.3);
      border-radius:40px; background:rgba(var(--accent-rgb),0.06);
    }
    .ph-year { font-family:var(--f-ui); font-size:0.58rem; font-weight:300; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-3); }
    .ph-title {
      font-family:var(--f-display); font-style:italic; font-weight:300;
      font-size:clamp(4rem, 12vw, 11rem); line-height:0.88; letter-spacing:-0.02em;
      overflow:hidden; margin-bottom:2.8rem;
    }
    .ph-tl {
      display:block; opacity:0; transform:translateY(105%);
      animation:su 0.95s var(--ease-out) forwards;
    }
    .ph-tl:nth-child(1) { animation-delay:0.45s; }
    .ph-tl:nth-child(2) {
      animation-delay:0.62s;
      margin-left:clamp(2rem, 8vw, 8rem);
      background:linear-gradient(125deg, var(--rose-light) 0%, var(--lavender-light) 50%, var(--ivory) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .ph-footer {
      display:flex; align-items:center; gap:2.5rem; flex-wrap:wrap;
      opacity:0; animation:fu 0.7s 1s var(--ease-out) forwards;
    }
    .ph-role { font-family:var(--f-ui); font-size:0.65rem; font-weight:200; letter-spacing:0.28em; text-transform:uppercase; color:var(--text-2); }
    .ph-sep  { width:1px; height:22px; background:var(--border); flex-shrink:0; }
    .ph-techs { display:flex; gap:0.6rem; flex-wrap:wrap; }
    .ph-techs span {
      font-family:var(--f-ui); font-size:0.52rem; letter-spacing:0.14em; text-transform:uppercase;
      padding:6px 14px; border:1px solid var(--border); border-radius:20px;
      color:var(--text-3); background:var(--surface);
    }
    .ph-cta {
      font-family:var(--f-ui); font-size:0.6rem; font-weight:300;
      letter-spacing:0.22em; text-transform:uppercase;
      text-decoration:none; padding:13px 28px; border-radius:40px;
      background:linear-gradient(135deg, var(--rose) 0%, #B07898 100%);
      color:var(--ivory); border:none; cursor:pointer;
      box-shadow:0 4px 28px rgba(var(--accent-rgb),0.3);
      transition:all 0.3s; position:relative; overflow:hidden;
    }
    .ph-cta::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, var(--rose-light), var(--lavender)); opacity:0; transition:opacity 0.3s; }
    .ph-cta:hover::before { opacity:1; }
    .ph-cta:hover { transform:translateY(-3px); box-shadow:0 10px 44px rgba(var(--accent-rgb),0.45); }
    .ph-cta span { position:relative; z-index:1; }
    .ph-scroll-line {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      width:1px; height:80px; background:linear-gradient(to bottom, rgba(var(--accent-rgb),0.4), transparent);
    }

    /* ─── VISUAL SHOWCASE ─── */
    .proj-visual {
      position:relative; z-index:2;
      margin:0 5%; border-radius:var(--radius-lg);
      overflow:hidden; border:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.025); backdrop-filter:blur(16px);
      height:clamp(280px, 42vw, 560px);
    }
    .proj-visual::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.4), rgba(184,169,217,0.35), transparent);
    }
    .pv-chrome {
      position:absolute; top:0; left:0; right:0; height:42px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 1.4rem; gap:0.45rem;
      background:rgba(255,255,255,0.02);
    }
    .pv-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .pv-dot:nth-child(1) { background:rgba(255,92,92,0.45); }
    .pv-dot:nth-child(2) { background:rgba(255,200,92,0.45); }
    .pv-dot:nth-child(3) { background:rgba(92,220,130,0.45); }
    .pv-url {
      margin-left:1.5rem; background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:6px; padding:5px 14px;
      font-family:var(--f-body); font-size:0.7rem; color:var(--text-3); min-width:200px;
    }
    .pv-content {
      position:absolute; inset:0; top:42px;
      display:flex; align-items:center; justify-content:center; padding:2rem;
      overflow:hidden;
    }
    .pv-content:has(img) { padding:0; align-items:flex-start; }
    .pv-content img {
      width:100%; height:100%;
      object-fit:cover; object-position:center 0%;
      display:block;
      animation:pv-scroll 10s cubic-bezier(0.45,0,0.55,1) 1.8s infinite alternate;
    }
    @keyframes pv-scroll {
      0%,12%  { object-position:center 0%; }
      88%,100% { object-position:center 100%; }
    }

    /* ─── CASE SECTIONS ─── */
    .case-section {
      position:relative; z-index:2;
      padding:110px 5%;
      display:grid; grid-template-columns:200px 1fr;
      gap:5rem; align-items:start;
      border-top:1px solid var(--border);
    }
    .cs-aside { position:sticky; top:100px; }
    .cs-num {
      font-family:var(--f-display); font-style:italic; font-weight:300;
      font-size:clamp(5rem, 9vw, 9rem); line-height:1;
      background:linear-gradient(180deg, rgba(var(--accent-rgb),0.22) 0%, transparent 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      user-select:none;
    }
    .cs-lbl {
      font-family:var(--f-ui); font-size:0.58rem; font-weight:300;
      letter-spacing:0.42em; text-transform:uppercase; color:var(--accent);
      margin-top:0.4rem;
    }
    .cs-headline {
      font-family:var(--f-display); font-style:italic; font-weight:300;
      font-size:clamp(1.9rem, 3.8vw, 3.2rem); line-height:1.15;
      margin-bottom:2rem;
    }
    .cs-text {
      font-size:1rem; line-height:1.88; color:var(--text-2);
      margin-bottom:2.5rem; max-width:700px;
    }
    .cs-text strong { color:var(--text-1); font-weight:400; }

    /* Pain point list */
    .cs-points { list-style:none; display:flex; flex-direction:column; gap:1rem; margin-bottom:2.5rem; }
    .cs-points li {
      display:flex; align-items:flex-start; gap:1rem;
      padding:1.2rem 1.5rem;
      background:rgba(255,255,255,0.025); border:1px solid var(--border);
      border-radius:var(--radius-md);
      font-size:0.9rem; color:var(--text-2); line-height:1.65;
      transition:border-color 0.25s, background 0.25s;
    }
    .cs-points li:hover { border-color:rgba(var(--accent-rgb),0.2); background:rgba(var(--accent-rgb),0.03); }
    .cs-points li::before { content:'✦'; color:var(--accent); font-size:0.5rem; flex-shrink:0; margin-top:0.4rem; opacity:0.65; }

    /* Solution cards */
    .cs-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; margin-bottom:2.5rem; }
    .cs-card {
      background:rgba(255,255,255,0.03); backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:var(--radius-lg); padding:2rem;
      position:relative; overflow:hidden;
      transition:border-color 0.35s, box-shadow 0.35s, transform 0.35s;
      transform-style:preserve-3d; will-change:transform;
    }
    .cs-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.35), transparent);
      opacity:0; transition:opacity 0.35s;
    }
    .cs-card:hover::before { opacity:1; }
    .cs-card:hover { border-color:rgba(var(--accent-rgb),0.22); box-shadow:0 20px 56px rgba(0,0,0,0.35), 0 0 30px rgba(var(--accent-rgb),0.05); }
    .cs-card-ico { font-size:1.4rem; margin-bottom:1.1rem; display:block; opacity:0.65; line-height:0; color:rgba(var(--accent-rgb),0.95); }
    .cs-card-ico svg { width:1.5rem; height:1.5rem; stroke:currentColor; fill:none; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; }
    .cs-card-title { font-family:var(--f-display); font-style:italic; font-weight:300; font-size:1.25rem; margin-bottom:0.7rem; line-height:1.2; }
    .cs-card-txt { font-size:0.84rem; color:var(--text-2); line-height:1.75; }

    /* Result stats */
    .cs-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; margin-bottom:2.5rem; }
    .cs-stat {
      background:rgba(255,255,255,0.03); backdrop-filter:blur(20px);
      border:1px solid rgba(var(--accent-rgb),0.14);
      border-radius:var(--radius-lg); padding:2.5rem 2rem; text-align:center;
      position:relative; overflow:hidden;
      transition:border-color 0.35s, box-shadow 0.35s, transform 0.35s;
      transform-style:preserve-3d; will-change:transform;
    }
    .cs-stat::before {
      content:''; position:absolute; top:0; left:20%; right:20%; height:1px;
      background:linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.5), transparent);
    }
    .cs-stat:hover { border-color:rgba(var(--accent-rgb),0.32); box-shadow:0 16px 50px rgba(var(--accent-rgb),0.1); }
    .cs-stat-n {
      font-family:var(--f-display); font-style:italic; font-weight:300;
      font-size:clamp(2.6rem, 5vw, 4.5rem); line-height:1; display:block; margin-bottom:0.5rem;
      background:linear-gradient(135deg, var(--rose-light), var(--lavender));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .cs-stat-l { font-family:var(--f-ui); font-size:0.54rem; font-weight:300; letter-spacing:0.26em; text-transform:uppercase; color:var(--text-3); }
    .cs-stat-desc { font-size:0.82rem; color:var(--text-2); line-height:1.65; margin-top:1rem; }

    /* ─── NEXT PROJECT ─── */
    #next-proj {
      position:relative; z-index:2; padding:80px 5%;
      border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:2rem;
    }
    .np-lbl { font-family:var(--f-ui); font-size:0.56rem; font-weight:300; letter-spacing:0.4em; text-transform:uppercase; color:var(--text-3); margin-bottom:0.8rem; }
    .np-title { font-family:var(--f-display); font-style:italic; font-weight:300; font-size:clamp(2rem, 4.5vw, 3.8rem); line-height:1.1; }
    .np-btn {
      font-family:var(--f-ui); font-size:0.6rem; font-weight:300;
      letter-spacing:0.22em; text-transform:uppercase;
      text-decoration:none; padding:14px 30px; border-radius:40px;
      border:1px solid var(--border-gold); color:var(--text-1);
      white-space:nowrap; transition:all 0.25s; background:transparent;
      display:flex; align-items:center; gap:0.7rem;
    }
    .np-btn::after { content:'→'; transition:transform 0.25s; }
    .np-btn:hover { background:rgba(var(--accent-rgb),0.1); box-shadow:0 0 28px rgba(var(--accent-rgb),0.2); }
    .np-btn:hover::after { transform:translateX(5px); }

    /* ─── FOOTER ─── */
    footer { position:relative; z-index:2; border-top:1px solid var(--border); padding:2.5rem 5%; display:flex; align-items:center; justify-content:space-between; }
    .ft { font-family:var(--f-ui); font-size:0.53rem; letter-spacing:0.2em; color:var(--text-3); }
    .ft-heart { color:var(--rose); }

    /* ─── RESPONSIVE ─── */
    @media(max-width:1024px) { .cs-cards { grid-template-columns:1fr 1fr; } }
    @media(max-width:768px) {
      body { cursor:auto; }
      .c-dot, .c-ring { display:none; }
      .case-section { grid-template-columns:1fr; gap:2rem; padding:80px 6%; }
      .cs-aside { position:static; display:flex; align-items:baseline; gap:1.2rem; }
      .cs-lbl { margin-top:0; }
      .cs-cards { grid-template-columns:1fr; }
      .cs-stats { grid-template-columns:1fr 1fr; }
      #next-proj { flex-direction:column; align-items:flex-start; }
      .proj-visual { margin:0 4%; height:clamp(200px, 52vw, 380px); }
      #proj-hero { padding:120px 6% 80px; }
      .ph-footer { flex-direction:column; align-items:flex-start; gap:1.5rem; }
      .ph-sep { display:none; }
      .nav-tag { display:none; }
      footer { flex-direction:column; gap:0.8rem; text-align:center; }
    }
    @media(max-width:480px) {
      .cs-stats { grid-template-columns:1fr; }
      .cs-cards { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <canvas class="cursor-trail" id="cursorTrail" style="position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:10000;"></canvas>

  <div class="aurora">
    <div class="blob blob-1" id="ablob1" style="background:radial-gradient(circle,#7B5EA7 0%,transparent 65%)"></div>
    <div class="blob blob-2" style="background:radial-gradient(circle,#C9906A 0%,transparent 65%)"></div>
    <div class="blob blob-3" style="background:radial-gradient(circle,#B8A9D9 0%,transparent 65%)"></div>
  </div>

  <canvas id="pcv"></canvas>

  <nav id="nav">
    <a href="index.html" class="nav-back">Portfolio</a>
    <span class="nav-tag" id="navTag">Case Study</span>
    <a href="#" class="nav-live" id="navLive" target="_blank">View Live ↗</a>
  </nav>

  <!-- Hero -->
  <section id="proj-hero">
    <div class="ph-meta">
      <span class="ph-tag" id="phTag"></span>
      <span class="ph-year" id="phYear"></span>
    </div>
    <h1 class="ph-title" id="phTitle"></h1>
    <div class="ph-footer">
      <span class="ph-role" id="phRole"></span>

<script>
/* ── Cursor Trail ── */
const trailCanvas=document.getElementById('cursorTrail');
const tctx=trailCanvas.getContext('2d',{alpha:true});
let TW,TH;
function resizeTrail(){const dpr=window.devicePixelRatio||1;TW=window.innerWidth;TH=window.innerHeight;trailCanvas.width=TW*dpr;trailCanvas.height=TH*dpr;trailCanvas.style.width=TW+'px';trailCanvas.style.height=TH+'px';tctx.scale(dpr,dpr);}
resizeTrail();window.addEventListener('resize',resizeTrail);
const TC={length:55,colorBase:[232,180,154],colorEnd:[184,169,217],alphaBase:0.92,alphaEnd:0,maxWidth:4.5,minWidth:0.3,damping:0.62,speedMax:520,speedSmoothing:0.18};
let curX=-300,curY=-300,prevX=-300,prevY=-300,lastT=0,smoothSpd=0,isHover=false;
const chain=Array.from({length:TC.length},()=>({x:-300,y:-300}));
document.addEventListener('mousemove',e=>{curX=e.clientX;curY=e.clientY;});
function lerp(a,b,t){return a+(b-a)*t;}
function lerpCol(c1,c2,t){return[c1[0]+(c2[0]-c1[0])*t|0,c1[1]+(c2[1]-c1[1])*t|0,c1[2]+(c2[2]-c1[2])*t|0];}
;(function drawTrail(ts){requestAnimationFrame(drawTrail);
const dt=Math.min(ts-lastT,50);lastT=ts;
const dx=curX-prevX,dy=curY-prevY;
const rawSpd=dt>0?Math.sqrt(dx*dx+dy*dy)/(dt/1000):0;
smoothSpd=lerp(smoothSpd,Math.min(rawSpd,TC.speedMax),TC.speedSmoothing);
const spdT=smoothSpd/TC.speedMax;
prevX=curX;prevY=curY;
chain[0].x=lerp(chain[0].x,curX,0.38);chain[0].y=lerp(chain[0].y,curY,0.38);
for(let i=1;i<TC.length;i++){const f=Math.pow(TC.damping,i*0.06)*0.38;chain[i].x=lerp(chain[i].x,chain[i-1].x,Math.max(f,0.04));chain[i].y=lerp(chain[i].y,chain[i-1].y,Math.max(f,0.04));}
tctx.clearRect(0,0,TW,TH);
for(let i=0;i<TC.length-1;i++){const t=i/(TC.length-1);const col=lerpCol(TC.colorBase,TC.colorEnd,t);const a=TC.alphaBase*(1-t)*(1-t);const w=lerp(TC.maxWidth+spdT*3,TC.minWidth,t);tctx.beginPath();tctx.moveTo(chain[i].x,chain[i].y);tctx.lineTo(chain[i+1].x,chain[i+1].y);tctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${a.toFixed(3)})`;tctx.lineWidth=isHover?w*1.6:w;tctx.lineCap='round';tctx.lineJoin='round';tctx.stroke();}
const dotR=isHover?5:3.5;tctx.beginPath();tctx.arc(chain[0].x,chain[0].y,dotR,0,Math.PI*2);tctx.fillStyle=`rgba(${TC.colorBase[0]},${TC.colorBase[1]},${TC.colorBase[2]},0.95)`;tctx.fill();
})();

/* ── Particles ── */
const pcv=document.getElementById('pcv'),ctx=pcv.getContext('2d');
let W,H,pts=[];
function rsz(){W=pcv.width=window.innerWidth;H=pcv.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
class Pt{constructor(){this.r()}r(){this.x=Math.random()*W;this.y=Math.random()*H;this.sz=Math.random()*1.4+0.4;this.vx=(Math.random()-.5)*.22;this.vy=(Math.random()-.5)*.22;this.op=Math.random()*.28+.07;this.c=Math.random()>.5?`rgba(201,144,106,${this.op})`:`rgba(184,169,217,${this.op})`;}tick(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.r();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);ctx.fillStyle=this.c;ctx.fill();}}
for(let i=0;i<75;i++)pts.push(new Pt());
;(function L(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.tick();p.draw();});requestAnimationFrame(L);})();

/* ── Nav scroll ── */
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>50));

/* ── Scroll reveal ── */
const revObs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});},{threshold:0.08,rootMargin:'0px 0px -50px 0px'});
document.querySelectorAll('.reveal').forEach(el=>revObs.observe(el));

/* ── 3D tilt on cards & stats ── */
document.addEventListener('mousemove',e=>{
  document.querySelectorAll('.cs-card,.cs-stat').forEach(card=>{
    const r=card.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
      const rx_=((e.clientY-r.top-r.height/2)/(r.height/2))*-5;
      const ry_=((e.clientX-r.left-r.width/2)/(r.width/2))*5;
      card.style.transform=`perspective(800px) rotateX(${rx_}deg) rotateY(${ry_}deg) translateZ(4px)`;
    }else{card.style.transform='perspective(800px) rotateX(0) rotateY(0)';}
  });
});

const proj  = DATA[pIdx] ?? DATA[0];
const next  = DATA[(pIdx + 1) % DATA.length];

/* Apply accent */
document.documentElement.style.setProperty('--accent', proj.color);

document.getElementById('ablob1').style.background = `radial-gradient(circle, ${proj.color}99 0%, transparent 65%)`;

/* Page title */
document.title = `${proj.title.join(' ')} — Keny Rodriguez`;

/* Nav */
document.getElementById('navTag').textContent  = proj.tag;
document.getElementById('navLive').href        = proj.live;

/* Hero */

document.getElementById('phYear').textContent = proj.year;
document.getElementById('phTitle').innerHTML  = proj.title.map((t,i) =>
  `<span class="ph-tl" style="animation-delay:${0.45+i*0.17}s${i===1
    ? ';margin-left:clamp(2rem,8vw,8rem);background:linear-gradient(125deg,var(--rose-light) 0%,var(--lavender-light) 50%,var(--ivory) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text'
    : ''}">${t}</span>`
).join('');
document.getElementById('phRole').textContent = proj.role;
proj.tech.forEach(t => {
  const s = document.createElement('span'); s.textContent = t;
  document.getElementById('phTechs').appendChild(s);
});
document.getElementById('phCta').href = proj.live;

/* Visual */
document.getElementById('pvUrl').textContent      = proj.pvUrl;
document.getElementById('pvContent').innerHTML    = proj.pvContent;

/* El Reto */
document.getElementById('retoH').textContent      = proj.reto.headline;
document.getElementById('retoT').innerHTML        = proj.reto.text;
proj.reto.points.forEach(pt => {

  li.textContent = pt;
  document.getElementById('retoP').appendChild(li);
});

/* La Solución */
document.getElementById('solH').textContent       = proj.solucion.headline;

  el.innerHTML = `<span class="cs-card-ico">${c.ico}</span><h3 class="cs-card-title">${c.title}</h3><p class="cs-card-txt">${c.txt}</p>`;
  document.getElementById('solC').appendChild(el);
});

/* El Resultado */
document.getElementById('resH').textContent       = proj.resultado.headline;

  el.innerHTML = `<span class="cs-stat-n">${s.n}</span><span class="cs-stat-l">${s.l}</span><p class="cs-stat-desc">${s.desc}</p>`;
  document.getElementById('resS').appendChild(el);
});

/* Next project */
document.getElementById('npTitle').textContent = next.title.join(' ');
document.getElementById('npBtn').href          = `project.html?id=${next.id}`;

/* Re-observe dynamically added elements */
document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));

/* Cursor grow on interactive elements */
document.querySelectorAll('a, button, .cs-card, .cs-stat, .cs-points li').forEach(el => {

  el.addEventListener('mouseleave', () => isHover = false);
});
